<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US History Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 260px;
            margin: 0 auto;
            padding: 10px;
        }
        button {
            margin: 5px 0;
            width: 100%;
        }
        #hint {
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h2>US History Quiz</h2>
    <div id="score">Score: 0/0</div>
    <div id="progress"></div>
    <div id="hints-used">Hints used: 0</div>
    <hr>
    <div id="question"></div>
    <div id="options"></div>
    <button id="hint-btn" onclick="showHint()">Show Hint</button>
    <div id="hint"></div>
    <div id="result"></div>
    <button id="next-btn" onclick="nextQuestion()" style="display:none;">Next Question</button>

    <script>
        const questions = [
            {
                question: "In which year was the Declaration of Independence signed?",
                options: ["1773", "1776", "1781", "1789"],
                answer: 1,
                hint: "It was during the American Revolutionary War."
            },
            {
                question: "Who was the first President of the United States?",
                options: ["Thomas Jefferson", "John Adams", "George Washington", "Benjamin Franklin"],
                answer: 2,
                hint: "He was a general during the Revolutionary War."
            },
            {
                question: "Which amendment to the US Constitution abolished slavery?",
                options: ["13th", "14th", "15th", "16th"],
                answer: 0,
                hint: "It was ratified in 1865, after the Civil War."
            },
            {
                question: "In which year did the United States enter World War II?",
                options: ["1939", "1940", "1941", "1942"],
                answer: 2,
                hint: "It was after the attack on Pearl Harbor."
            },
            {
                question: "Who was the President during the Civil War?",
                options: ["Andrew Johnson", "Ulysses S. Grant", "James Buchanan", "Abraham Lincoln"],
                answer: 3,
                hint: "He delivered the Gettysburg Address."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let hintsUsed = 0;
        let progress = [];

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question').textContent = q.question;
            const options = document.getElementById('options');
            options.innerHTML = '';
            for (let i = 0; i < q.options.length; i++) {
                options.innerHTML += `<button onclick="checkAnswer(${i})">${q.options[i]}</button>`;
            }
            document.getElementById('hint').textContent = '';
            document.getElementById('result').textContent = '';
            document.getElementById('hint-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
        }

        function checkAnswer(choice) {
            const q = questions[currentQuestion];
            const resultDiv = document.getElementById('result');
            if (choice === q.answer) {
                resultDiv.textContent = "Correct!";
                score++;
                progress.push("✓");
            } else {
                resultDiv.textContent = `Incorrect. The correct answer is: ${q.options[q.answer]}`;
                progress.push("✗");
            }
            document.getElementById('score').textContent = `Score: ${score}/${currentQuestion + 1}`;
            document.getElementById('progress').textContent = progress.join(" ");
            document.getElementById('options').innerHTML = '';
            document.getElementById('hint-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        }

        function showHint() {
            document.getElementById('hint').textContent = questions[currentQuestion].hint;
            hintsUsed++;
            document.getElementById('hints-used').textContent = `Hints used: ${hintsUsed}`;
            document.getElementById('hint-btn').style.display = 'none';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                document.getElementById('question').textContent = "Quiz completed!";
                document.getElementById('options').innerHTML = '';
                document.getElementById('hint-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                document.getElementById('result').textContent = `Final score: ${score}/${questions.length}`;
            }
        }

        loadQuestion();
    </script>
</body>
</html>
